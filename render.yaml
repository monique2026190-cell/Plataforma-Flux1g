services:
  - type: web
    name: flux-platform
    env: node
    plan: free
    rootDir: .
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: node dist/server.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
